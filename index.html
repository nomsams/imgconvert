<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Prism Pro | Advanced HEIC to JPG/PNG Converter</title>
    <meta name="description" content="Convert HEIC to JPG/PNG instantly. Features bulk processing, quality control, and instant re-conversion without re-uploading. Secure & Local.">
    <meta name="keywords" content="heic to jpg, heic to png, heic converter, bulk image converter, offline converter">
    <meta name="author" content="Prism Tools">
    <meta name="theme-color" content="#6366f1">
    
    <!-- Open Graph -->
    <meta property="og:title" content="Prism Pro - HEIC Converter">
    <meta property="og:description" content="Professional local HEIC conversion tool.">
    <meta property="og:type" content="website">

    <!-- JSON-LD SEO -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Prism Pro Converter",
      "applicationCategory": "PhotoEditor",
      "operatingSystem": "Browser",
      "offers": { "@type": "Offer", "price": "0" },
      "featureList": "HEIC to JPG/PNG, Client-side processing, Bulk Conversion, Re-processing"
    }
    </script>

    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/heic2any/0.0.4/heic2any.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
            
            /* Dark Theme (Default) */
            --bg-body: #0f172a;
            --bg-panel: #1e293b;
            --bg-card: #334155;
            --border: #475569;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --radius: 16px;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        [data-theme="light"] {
            --bg-body: #f1f5f9;
            --bg-panel: #ffffff;
            --bg-card: #e2e8f0;
            --border: #cbd5e1;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: background 0.3s, border 0.3s, color 0.3s; }
        
        body {
            font-family: var(--font-sans);
            background: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- Header --- */
        header {
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-main);
        }
        .logo span { color: var(--primary); }

        .theme-toggle {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-main);
            width: 40px; height: 40px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }
        .theme-toggle:hover { border-color: var(--primary); }

        /* --- Layout --- */
        .container {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 2rem;
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            width: 100%;
            flex: 1;
        }

        /* --- Sidebar --- */
        aside {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .panel {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            box-shadow: var(--shadow);
        }

        .panel h3 { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 1rem; }

        .control-group { margin-bottom: 1.25rem; }
        .control-group label { display: block; font-size: 0.9rem; font-weight: 500; margin-bottom: 0.5rem; }

        select, input[type="range"] {
            width: 100%;
            background: var(--bg-body);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 0.75rem;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
        }
        select:focus { border-color: var(--primary); }

        /* --- Main Content --- */
        main { display: flex; flex-direction: column; gap: 2rem; }

        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            background: var(--bg-panel);
            min-height: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .drop-zone:hover { border-color: var(--primary); background: rgba(99, 102, 241, 0.05); }
        .drop-zone.drag-over { border-color: var(--primary); transform: scale(0.99); }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex; align-items: center; gap: 0.5rem;
            transition: 0.2s;
        }
        .btn:hover { background: var(--primary-hover); transform: translateY(-1px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-secondary { background: var(--bg-card); color: var(--text-main); }
        .btn-secondary:hover { background: var(--border); }

        /* --- Reprocess Alert --- */
        .reprocess-bar {
            background: rgba(99, 102, 241, 0.15);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 1rem;
            border-radius: var(--radius);
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideDown 0.3s ease;
        }

        /* --- Grid --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            position: relative;
            animation: fadeIn 0.4s ease;
        }

        .card-header { display: flex; gap: 1rem; align-items: center; }
        
        .preview-box {
            width: 60px; height: 60px;
            background: var(--bg-body);
            border-radius: 8px;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        .preview-box img { width: 100%; height: 100%; object-fit: cover; }

        .file-info { flex: 1; overflow: hidden; }
        .filename { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* Conversion Path Badge */
        .conversion-path {
            display: flex; align-items: center; gap: 0.5rem;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
            background: var(--bg-body);
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            width: fit-content;
        }
        .badge { font-weight: 700; color: var(--text-main); }

        .status-icon { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
        .spinner { animation: spin 1s linear infinite; color: var(--primary); }
        
        .card-actions {
            display: grid; grid-template-columns: 1fr 1fr auto; gap: 0.5rem;
            margin-top: auto;
        }
        .btn-sm { padding: 0.5rem; font-size: 0.85rem; justify-content: center; }

        /* Mobile */
        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; padding: 1rem; }
            header { padding: 1rem; }
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <i data-lucide="layers"></i>
            Prism<span>Pro</span>
        </div>
        <button class="theme-toggle" id="themeToggle" title="Toggle Dark Mode">
            <i data-lucide="moon" id="themeIcon"></i>
        </button>
    </header>

    <div class="container">
        <!-- Sidebar: Settings -->
        <aside>
            <div class="panel">
                <h3>Output Configuration</h3>
                
                <div class="control-group">
                    <label>Target Format</label>
                    <select id="formatSelect">
                        <option value="image/jpeg">JPG (JPEG)</option>
                        <option value="image/png">PNG (Lossless)</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>Quality: <span id="qualityVal">90%</span></label>
                    <input type="range" id="qualityRange" min="0.1" max="1.0" step="0.05" value="0.9">
                </div>

                <div class="control-group">
                    <label>Resize (Width)</label>
                    <select id="resizeSelect">
                        <option value="original">Original Size</option>
                        <option value="1920">Full HD (1920px)</option>
                        <option value="1280">HD (1280px)</option>
                        <option value="800">Web (800px)</option>
                    </select>
                </div>
            </div>

            <div class="panel">
                <h3>Actions</h3>
                <button class="btn btn-secondary" id="clearBtn" style="width:100%; margin-bottom:0.5rem;">
                    <i data-lucide="trash-2"></i> Clear All
                </button>
                <button class="btn" id="downloadAllBtn" style="width:100%;" disabled>
                    <i data-lucide="archive"></i> Download All (ZIP)
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main>
            <!-- Drop Zone -->
            <div class="drop-zone" id="dropZone">
                <i data-lucide="upload-cloud" size="48" style="color:var(--primary); margin-bottom:1rem;"></i>
                <h2 style="margin-bottom:0.5rem;">Drop HEIC files here</h2>
                <p style="color:var(--text-muted); margin-bottom:1.5rem;">or click to browse</p>
                <button class="btn" onclick="document.getElementById('fileInput').click()">Select Files</button>
                <input type="file" id="fileInput" accept=".heic,.HEIC" multiple style="display:none">
            </div>

            <!-- Reprocess Prompt (Hidden by default) -->
            <div id="reprocessAlert" class="reprocess-bar" style="display:none;">
                <span><i data-lucide="settings-2" style="display:inline; vertical-align:middle; margin-right:8px;"></i> Settings changed. Update converted files?</span>
                <button class="btn btn-sm" id="applyChangesBtn">Apply Changes</button>
            </div>

            <!-- Results Grid -->
            <div class="grid" id="fileGrid"></div>
        </main>
    </div>

    <script>
        // --- Icons Init ---
        lucide.createIcons();

        // --- State ---
        const state = {
            files: [], // { id, originalFile, blob, url, status, currentFormat }
            processing: false,
            queue: []
        };

        // --- Elements ---
        const els = {
            dropZone: document.getElementById('dropZone'),
            fileInput: document.getElementById('fileInput'),
            fileGrid: document.getElementById('fileGrid'),
            formatSelect: document.getElementById('formatSelect'),
            qualityRange: document.getElementById('qualityRange'),
            qualityVal: document.getElementById('qualityVal'),
            resizeSelect: document.getElementById('resizeSelect'),
            reprocessAlert: document.getElementById('reprocessAlert'),
            applyChangesBtn: document.getElementById('applyChangesBtn'),
            downloadAllBtn: document.getElementById('downloadAllBtn'),
            clearBtn: document.getElementById('clearBtn'),
            themeToggle: document.getElementById('themeToggle'),
            themeIcon: document.getElementById('themeIcon')
        };

        // --- Theme Logic ---
        els.themeToggle.addEventListener('click', () => {
            const html = document.documentElement;
            const isDark = html.getAttribute('data-theme') === 'dark';
            html.setAttribute('data-theme', isDark ? 'light' : 'dark');
            els.themeIcon.setAttribute('data-lucide', isDark ? 'sun' : 'moon');
            lucide.createIcons();
        });

        // --- Settings Change Logic (The "Regenerate" Feature) ---
        function onSettingsChange() {
            els.qualityVal.textContent = Math.round(els.qualityRange.value * 100) + '%';
            
            // Only show alert if we have files
            if (state.files.length > 0) {
                els.reprocessAlert.style.display = 'flex';
            }
        }

        [els.formatSelect, els.qualityRange, els.resizeSelect].forEach(el => {
            el.addEventListener('input', onSettingsChange);
        });

        els.applyChangesBtn.addEventListener('click', () => {
            els.reprocessAlert.style.display = 'none';
            // Reset all to pending and re-queue
            state.files.forEach(f => {
                f.status = 'pending';
                state.queue.push(f);
            });
            processQueue();
        });

        // --- File Handling ---
        els.dropZone.addEventListener('click', () => els.fileInput.click());
        els.dropZone.addEventListener('dragover', (e) => { e.preventDefault(); els.dropZone.classList.add('drag-over'); });
        els.dropZone.addEventListener('dragleave', () => els.dropZone.classList.remove('drag-over'));
        els.dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            els.dropZone.classList.remove('drag-over');
            handleFiles(e.dataTransfer.files);
        });
        els.fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

        function handleFiles(fileList) {
            const newFiles = Array.from(fileList).filter(f => 
                f.name.toLowerCase().endsWith('.heic') || f.type === "image/heic"
            );

            if (newFiles.length === 0) return;

            newFiles.forEach(file => {
                const id = Math.random().toString(36).substr(2, 9);
                const fileObj = { id, originalFile: file, status: 'pending' };
                state.files.push(fileObj);
                state.queue.push(fileObj);
                createCard(fileObj);
            });

            processQueue();
        }

        // --- Processing Engine ---
        async function processQueue() {
            if (state.processing || state.queue.length === 0) return;
            
            state.processing = true;
            const fileObj = state.queue.shift(); // Process one by one for stability
            
            await convertFile(fileObj);
            
            state.processing = false;
            
            if (state.queue.length > 0) {
                processQueue();
            } else {
                checkAllDone();
            }
        }

        async function convertFile(fileObj) {
            const card = document.getElementById(fileObj.id);
            updateCardStatus(card, 'processing');

            try {
                const format = els.formatSelect.value;
                const quality = parseFloat(els.qualityRange.value);
                const resizeW = els.resizeSelect.value;

                // 1. Convert
                let blob = await heic2any({
                    blob: fileObj.originalFile,
                    toType: format,
                    quality: quality
                });

                if (Array.isArray(blob)) blob = blob[0];

                // 2. Resize (if needed)
                if (resizeW !== 'original') {
                    blob = await resizeImage(blob, parseInt(resizeW), format, quality);
                }

                // 3. Update Object
                const ext = format === 'image/jpeg' ? 'jpg' : 'png';
                const newName = fileObj.originalFile.name.replace(/\.[^/.]+$/, "") + "." + ext;
                
                fileObj.blob = blob;
                fileObj.url = URL.createObjectURL(blob);
                fileObj.newName = newName;
                fileObj.currentFormat = ext.toUpperCase();
                fileObj.status = 'done';

                // 4. Update UI
                updateCardSuccess(card, fileObj);

            } catch (err) {
                console.error(err);
                fileObj.status = 'error';
                updateCardError(card);
            }
        }

        // --- UI Updates ---
        function createCard(fileObj) {
            const div = document.createElement('div');
            div.className = 'card';
            div.id = fileObj.id;
            div.innerHTML = `
                <div class="card-header">
                    <div class="preview-box">
                        <i data-lucide="image" style="color:var(--text-muted)"></i>
                    </div>
                    <div class="file-info">
                        <div class="filename" title="${fileObj.originalFile.name}">${fileObj.originalFile.name}</div>
                        <div class="conversion-path">
                            <span class="badge">HEIC</span> 
                            <i data-lucide="arrow-right" size="12"></i> 
                            <span class="badge target-badge">...</span>
                        </div>
                    </div>
                    <div class="status-icon">
                        <i data-lucide="loader-2" class="spinner"></i>
                    </div>
                </div>
                <div class="card-actions">
                    <button class="btn btn-secondary btn-sm" onclick="reprocessOne('${fileObj.id}')" title="Regenerate">
                        <i data-lucide="refresh-cw" size="14"></i> Redo
                    </button>
                    <button class="btn btn-sm download-btn" disabled onclick="downloadOne('${fileObj.id}')">
                        <i data-lucide="download" size="14"></i> Save
                    </button>
                    <button class="btn btn-secondary btn-sm" onclick="removeOne('${fileObj.id}')" style="color:var(--danger)">
                        <i data-lucide="x" size="14"></i>
                    </button>
                </div>
            `;
            els.fileGrid.prepend(div);
            lucide.createIcons();
        }

        function updateCardStatus(card, status) {
            const iconContainer = card.querySelector('.status-icon');
            const targetBadge = card.querySelector('.target-badge');
            const format = els.formatSelect.value === 'image/jpeg' ? 'JPG' : 'PNG';
            
            targetBadge.textContent = format;

            if (status === 'processing') {
                iconContainer.innerHTML = `<i data-lucide="loader-2" class="spinner"></i>`;
                card.style.opacity = '0.7';
            }
            lucide.createIcons();
        }

        function updateCardSuccess(card, fileObj) {
            const iconContainer = card.querySelector('.status-icon');
            const previewBox = card.querySelector('.preview-box');
            const dlBtn = card.querySelector('.download-btn');

            card.style.opacity = '1';
            iconContainer.innerHTML = `<i data-lucide="check-circle" style="color:var(--success)"></i>`;
            
            // Show thumbnail
            previewBox.innerHTML = `<img src="${fileObj.url}" alt="preview">`;
            
            dlBtn.disabled = false;
            dlBtn.classList.remove('btn-secondary'); // Make it primary
            
            lucide.createIcons();
            updateGlobalButtons();
        }

        function updateCardError(card) {
            const iconContainer = card.querySelector('.status-icon');
            card.style.opacity = '1';
            iconContainer.innerHTML = `<i data-lucide="alert-triangle" style="color:var(--danger)"></i>`;
            lucide.createIcons();
        }

        // --- Actions ---
        window.reprocessOne = (id) => {
            const fileObj = state.files.find(f => f.id === id);
            if (fileObj) {
                fileObj.status = 'pending';
                state.queue.push(fileObj);
                processQueue();
            }
        };

        window.downloadOne = (id) => {
            const f = state.files.find(f => f.id === id);
            if (f && f.blob) saveAs(f.blob, f.newName);
        };

        window.removeOne = (id) => {
            state.files = state.files.filter(f => f.id !== id);
            document.getElementById(id).remove();
            updateGlobalButtons();
            if(state.files.length === 0) els.reprocessAlert.style.display = 'none';
        };

        els.downloadAllBtn.addEventListener('click', async () => {
            const zip = new JSZip();
            let count = 0;
            state.files.forEach(f => {
                if (f.status === 'done') {
                    zip.file(f.newName, f.blob);
                    count++;
                }
            });

            if (count === 0) return;

            const btn = els.downloadAllBtn;
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Compressing...';
            btn.disabled = true;

            const content = await zip.generateAsync({type:"blob"});
            saveAs(content, "converted_images.zip");
            
            btn.innerHTML = originalText;
            btn.disabled = false;
        });

        els.clearBtn.addEventListener('click', () => {
            state.files = [];
            state.queue = [];
            els.fileGrid.innerHTML = '';
            els.reprocessAlert.style.display = 'none';
            updateGlobalButtons();
        });

        // --- Helpers ---
        function updateGlobalButtons() {
            const hasDone = state.files.some(f => f.status === 'done');
            els.downloadAllBtn.disabled = !hasDone;
        }

        function checkAllDone() {
            if (state.files.length > 0 && state.files.every(f => f.status === 'done')) {
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            }
        }

        function resizeImage(blob, maxWidth, type, quality) {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = URL.createObjectURL(blob);
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width;
                    let h = img.height;

                    if (w > maxWidth) {
                        h = Math.round(h * (maxWidth / w));
                        w = maxWidth;
                    }

                    canvas.width = w;
                    canvas.height = h;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, w, h);
                    canvas.toBlob(resolve, type, quality);
                };
            });
        }
    </script>
</body>
</html>
