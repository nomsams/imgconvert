<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Prism | Ultimate HEIC to JPG/PNG Converter</title>
    <meta name="description" content="Professional grade HEIC converter. Convert, resize, and optimize HEIC photos locally in your browser. No uploads, 100% privacy.">
    <meta name="keywords" content="heic to jpg, heic converter, iphone photo tool, local image converter, bulk heic processor">
    <meta name="author" content="Prism Tools">
    <meta name="theme-color" content="#4f46e5">
    
    <!-- Open Graph / Social -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Prism - HEIC Converter">
    <meta property="og:description" content="Convert HEIC images instantly with privacy.">
    <meta property="og:image" content="https://via.placeholder.com/1200x630.png?text=Prism+Converter">

    <!-- JSON-LD SEO -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",

      },

    }
    </script>

    <!-- External Libs (CDN) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/heic2any/0.0.4/heic2any.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Confetti for delight -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        /* --- CSS VARIABLES & RESET --- */
        :root {
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            
            /* Dark Theme (Default) */
            --bg-app: #0f172a;
            --bg-panel: rgba(30, 41, 59, 0.7);
            --bg-card: rgba(51, 65, 85, 0.5);
            --border: rgba(148, 163, 184, 0.1);
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.4);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 8px;
            --glass: blur(20px) saturate(180%);
        }

        [data-theme="light"] {
            --bg-app: #f8fafc;
            --bg-panel: rgba(255, 255, 255, 0.8);
            --bg-card: rgba(255, 255, 255, 0.6);
            --border: rgba(0, 0, 0, 0.05);
            --primary: #4f46e5;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: var(--font-sans);
            background-color: var(--bg-app);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 0.5s ease;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(236, 72, 153, 0.15) 0%, transparent 40%);
        }

        /* --- LAYOUT --- */
        .app-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2rem;
            min-height: 100vh;
        }

        /* --- SIDEBAR (SETTINGS) --- */
        aside {
            position: sticky;
            top: 2rem;
            height: fit-content;
            background: var(--bg-panel);
            backdrop-filter: var(--glass);
            -webkit-backdrop-filter: var(--glass);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            z-index: 10;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            color: var(--text-main);
        }
        .brand svg { color: var(--primary); }

        .setting-group { display: flex; flex-direction: column; gap: 0.75rem; }
        .setting-label { font-size: 0.85rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
        
        /* Custom Inputs */
        .select-wrapper { position: relative; }
        select {
            width: 100%;
            appearance: none;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 0.75rem 1rem;
            border-radius: var(--radius-sm);
            font-family: inherit;
            cursor: pointer;
            transition: 0.2s;
        }
        select:hover { border-color: var(--primary); }
        .select-icon { position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); pointer-events: none; color: var(--text-muted); }

        input[type="range"] {
            width: 100%;
            height: 6px;
            background: var(--bg-card);
            border-radius: 10px;
            appearance: none;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 18px;
            height: 18px;
            background: var(--primary);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px var(--primary-glow);
        }

        .toggle-row { display: flex; justify-content: space-between; align-items: center; }
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            transition: .4s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 2px;
            bottom: 2px;
            background-color: var(--text-muted);
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--primary); border-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(20px); background-color: white; }

        /* --- MAIN CONTENT --- */
        main { display: flex; flex-direction: column; gap: 2rem; }

        /* Drop Zone */
        .drop-zone {
            background: var(--bg-panel);
            border: 2px dashed var(--border);
            border-radius: var(--radius-lg);
            min-height: 250px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .drop-zone:hover { border-color: var(--primary); transform: translateY(-2px); }
        .drop-zone.drag-over { border-color: var(--primary); background: rgba(99, 102, 241, 0.1); transform: scale(1.01); }
        
        .drop-content h2 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .drop-content p { color: var(--text-muted); margin-bottom: 1.5rem; }
        
        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 10px 20px -5px var(--primary-glow);
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 15px 25px -5px var(--primary-glow); }
        .btn-primary:active { transform: translateY(0); }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-card);
            padding: 1rem 1.5rem;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            opacity: 0;
            transform: translateY(10px);
            animation: fadeIn 0.5s forwards;
        }
        .stat-item { display: flex; gap: 0.5rem; align-items: center; font-size: 0.9rem; color: var(--text-muted); }
        .stat-value { color: var(--text-main); font-weight: 700; }

        /* Grid */
        .file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        /* File Card */
        .file-card {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            position: relative;
            transition: 0.3s;
            animation: slideUp 0.4s ease-out forwards;
        }
        .file-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }

        .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .file-icon-wrapper {
            width: 48px; height: 48px;
            background: var(--bg-app);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .file-icon-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        
        .file-details { flex: 1; margin-left: 1rem; overflow: hidden; }
        .filename { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 0.95rem; }
        .filesize { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.2rem; }

        .status-indicator {
            width: 24px; height: 24px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        .status-waiting { border: 2px solid var(--border); border-top-color: var(--primary); animation: spin 1s linear infinite; }
        .status-done { color: var(--success); }
        .status-error { color: var(--danger); }

        .card-actions {
            display: flex; gap: 0.5rem; margin-top: auto;
        }
        .btn-icon {
            flex: 1;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 0.5rem;
            border-radius: var(--radius-sm);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
            font-size: 0.85rem;
            transition: 0.2s;
        }
        .btn-icon:hover { background: var(--bg-app); border-color: var(--primary); }
        .btn-download { background: var(--primary); color: white; border: none; }
        .btn-download:hover { background: #4338ca; }

        /* Mobile Responsive */
        @media (max-width: 900px) {
            .app-container { grid-template-columns: 1fr; padding: 1rem; }
            aside { position: relative; top: 0; z-index: 1; }
            .drop-zone { min-height: 200px; }
        }

        /* Animations */
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Toast */
        .toast-container {
            position: fixed; bottom: 2rem; right: 2rem;
            display: flex; flex-direction: column; gap: 1rem;
            z-index: 100;
            pointer-events: none;
        }
        .toast {
            background: var(--bg-panel);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            padding: 1rem 1.5rem;
            border-radius: var(--radius-md);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
            display: flex; align-items: center; gap: 0.75rem;
            animation: slideInRight 0.3s ease;
            pointer-events: auto;
        }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    </style>
</head>
<body>

    <div class="app-container">
        <!-- Sidebar Settings -->
        <aside>
            <div class="brand">
                <i data-lucide="hexagon"></i> Prism
            </div>

            <div class="setting-group">
                <label class="setting-label">Output Format</label>
                <div class="select-wrapper">
                    <select id="formatSelect">
                        <option value="image/jpeg">JPG (Best for Photos)</option>
                        <option value="image/png">PNG (Lossless)</option>
                    </select>
                    <i data-lucide="chevron-down" class="select-icon" size="16"></i>
                </div>
            </div>

            <div class="setting-group">
                <div class="toggle-row">
                    <label class="setting-label">Quality</label>
                    <span id="qualityVal" style="font-size:0.8rem; font-weight:700; color:var(--primary)">90%</span>
                </div>
                <input type="range" id="qualityRange" min="0.1" max="1.0" step="0.05" value="0.9">
            </div>

            <div class="setting-group">
                <label class="setting-label">Resize Width (Optional)</label>
                <div class="select-wrapper">
                    <select id="resizeSelect">
                        <option value="original">Original Size</option>
                        <option value="3840">4K (3840px)</option>
                        <option value="1920">Full HD (1920px)</option>

                        <option value="800">Web (800px)</option>
                    </select>
                    <i data-lucide="chevron-down" class="select-icon" size="16"></i>
                </div>
            </div>

            <div class="setting-group">
                <div class="toggle-row">
                    <label class="setting-label">Dark Mode</label>
                    <label class="switch">
                        <input type="checkbox" id="themeToggle" checked>
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <div style="margin-top:auto; padding-top:1rem; border-top:1px solid var(--border); font-size:0.8rem; color:var(--text-muted); text-align:center;">
                <p>Processed locally. <br>Your photos never leave this device.</p>
            </div>
        </aside>

        <!-- Main Area -->
        <main>
            <div class="drop-zone" id="dropZone">
                <div class="drop-content">
                    <div style="margin-bottom:1.5rem; color:var(--primary);">
                        <i data-lucide="upload-cloud" size="64"></i>
                    </div>
                    <h2>Drag & Drop HEIC Files</h2>
                    <p>or click to browse your device</p>
                    <button class="btn-primary" onclick="document.getElementById('fileInput').click()">
                        <i data-lucide="image-plus"></i> Select Photos
                    </button>
                    <input type="file" id="fileInput" accept=".heic,.HEIC" multiple style="display:none">
                </div>
            </div>

            <!-- Stats & Bulk Actions -->
            <div class="stats-bar" id="statsBar" style="display:none;">
                <div style="display:flex; gap:1.5rem;">
                    <div class="stat-item">
                        <i data-lucide="files" size="16"></i>
                        <span id="countStat" class="stat-value">0</span> Files
                    </div>
                    <div class="stat-item">
                        <i data-lucide="hard-drive" size="16"></i>
                        Saved <span id="sizeStat" class="stat-value">0 MB</span>
                    </div>
                </div>
                <div style="display:flex; gap:0.5rem;">
                    <button class="btn-icon" id="clearBtn" title="Clear All">
                        <i data-lucide="trash-2" size="16"></i>
                    </button>
                    <button class="btn-primary" id="downloadAllBtn" style="padding:0.5rem 1rem; font-size:0.9rem;">
                        <i data-lucide="archive"></i> Download ZIP
                    </button>
                </div>
            </div>

            <div class="file-grid" id="fileGrid"></div>
        </main>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        // --- INITIALIZATION ---
        lucide.createIcons();
        
        // --- STATE MANAGEMENT ---
        const state = {
            files: [], // { id, originalFile, blob, url, status, newName }
            queue: [],
            processing: false,
            totalSaved: 0
        };

        const els = {
            dropZone: document.getElementById('dropZone'),
            fileInput: document.getElementById('fileInput'),
            fileGrid: document.getElementById('fileGrid'),
            statsBar: document.getElementById('statsBar'),
            countStat: document.getElementById('countStat'),
            sizeStat: document.getElementById('sizeStat'),
            downloadAllBtn: document.getElementById('downloadAllBtn'),
            clearBtn: document.getElementById('clearBtn'),
            formatSelect: document.getElementById('formatSelect'),
            qualityRange: document.getElementById('qualityRange'),
            qualityVal: document.getElementById('qualityVal'),
            resizeSelect: document.getElementById('resizeSelect'),
            themeToggle: document.getElementById('themeToggle')
        };

        // --- THEME HANDLING ---
        els.themeToggle.addEventListener('change', (e) => {
            document.documentElement.setAttribute('data-theme', e.target.checked ? 'dark' : 'light');
        });

        // --- SETTINGS HANDLING ---
        els.qualityRange.addEventListener('input', (e) => {
            els.qualityVal.textContent = Math.round(e.target.value * 100) + '%';
        });

        // --- DRAG & DROP ---
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            els.dropZone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) { e.preventDefault(); e.stopPropagation(); }

        els.dropZone.addEventListener('dragover', () => els.dropZone.classList.add('drag-over'));
        els.dropZone.addEventListener('dragleave', () => els.dropZone.classList.remove('drag-over'));
        els.dropZone.addEventListener('drop', (e) => {
            els.dropZone.classList.remove('drag-over');
            handleFiles(e.dataTransfer.files);
        });
        els.fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

        // --- CORE LOGIC ---
        function handleFiles(fileList) {
            const validFiles = Array.from(fileList).filter(f => 
                f.name.toLowerCase().endsWith('.heic') || f.type === "image/heic"
            );

            if (validFiles.length === 0) {
                showToast('No HEIC files found', 'error');
                return;
            }

            els.statsBar.style.display = 'flex';
            
            validFiles.forEach(file => {
                const id = Math.random().toString(36).substr(2, 9);
                const fileObj = {
                    id,
                    originalFile: file,
                    status: 'pending'
                };
                state.files.push(fileObj);
                state.queue.push(fileObj);
                renderCard(fileObj);
            });

            updateStats();
            processQueue();
        }

        async function processQueue() {
            if (state.processing || state.queue.length === 0) return;
            
            state.processing = true;
            // Process 2 files concurrently for performance balance
            const batch = state.queue.splice(0, 2);
            
            await Promise.all(batch.map(convertFile));
            
            state.processing = false;
            
            if (state.queue.length > 0) {
                processQueue();
            } else {
                // All done
                if(state.files.every(f => f.status === 'done')) {
                    confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
                    showToast('All files converted successfully!', 'success');
                }
            }
        }

        async function convertFile(fileObj) {
            const card = document.getElementById(fileObj.id);
            const statusIcon = card.querySelector('.status-indicator');
            
            // Update UI to processing
            statusIcon.className = 'status-indicator status-waiting';
            
            try {
                const format = els.formatSelect.value;
                const quality = parseFloat(els.qualityRange.value);
                const resizeWidth = els.resizeSelect.value;

                // 1. Convert HEIC
                let blob = await heic2any({
                    blob: fileObj.originalFile,
                    toType: format,
                    quality: quality
                });

                // Handle burst photos (array return)
                if (Array.isArray(blob)) blob = blob[0];

                // 2. Resize if needed (using Canvas)
                if (resizeWidth !== 'original') {
                    blob = await resizeImage(blob, parseInt(resizeWidth), format, quality);
                }

                // 3. Finalize
                const url = URL.createObjectURL(blob);
                const ext = format === 'image/jpeg' ? 'jpg' : 'png';
                const newName = fileObj.originalFile.name.replace(/\.[^/.]+$/, "") + "." + ext;

                fileObj.blob = blob;
                fileObj.url = url;
                fileObj.newName = newName;
                fileObj.status = 'done';

                // Update Stats
                const savedBytes = fileObj.originalFile.size - blob.size;
                if(savedBytes > 0) state.totalSaved += savedBytes;

                // Update UI
                const img = document.createElement('img');
                img.src = url;
                card.querySelector('.file-icon-wrapper').innerHTML = '';
                card.querySelector('.file-icon-wrapper').appendChild(img);
                
                card.querySelector('.filesize').textContent = formatBytes(blob.size);
                
                statusIcon.className = 'status-indicator status-done';
                statusIcon.innerHTML = `<i data-lucide="check" size="16"></i>`;
                
                // Enable buttons
                const dlBtn = card.querySelector('.btn-download');
                dlBtn.disabled = false;
                dlBtn.onclick = () => saveAs(blob, newName);
                
                lucide.createIcons();
                updateStats();

            } catch (err) {
                console.error(err);
                fileObj.status = 'error';
                statusIcon.className = 'status-indicator status-error';
                statusIcon.innerHTML = `<i data-lucide="alert-circle" size="16"></i>`;
                card.querySelector('.filesize').textContent = "Conversion Failed";
                lucide.createIcons();
            }
        }

        // --- HELPER: RESIZE IMAGE ---
        function resizeImage(blob, maxWidth, type, quality) {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = URL.createObjectURL(blob);
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;

                    if (width > maxWidth) {
                        height = Math.round(height * (maxWidth / width));
                        width = maxWidth;
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    canvas.toBlob((b) => {
                        resolve(b);
                    }, type, quality);
                };
            });
        }

        // --- UI RENDERING ---
        function renderCard(fileObj) {
            const div = document.createElement('div');
            div.className = 'file-card';
            div.id = fileObj.id;
            div.innerHTML = `
                <div class="card-header">
                    <div style="display:flex; gap:1rem; width:100%">
                        <div class="file-icon-wrapper">
                            <i data-lucide="image" style="color:var(--text-muted)"></i>
                        </div>
                        <div class="file-details">
                            <div class="filename" title="${fileObj.originalFile.name}">${fileObj.originalFile.name}</div>
                            <div class="filesize">${formatBytes(fileObj.originalFile.size)}</div>
                        </div>
                        <div class="status-indicator"></div>
                    </div>
                </div>
                <div class="card-actions">
                    <button class="btn-icon" onclick="removeFile('${fileObj.id}')">
                        <i data-lucide="x"></i>
                    </button>
                    <button class="btn-icon btn-download" disabled>
                        <i data-lucide="download"></i> Save
                    </button>
                </div>
            `;
            els.fileGrid.prepend(div);
            lucide.createIcons();
        }

        function removeFile(id) {
            const idx = state.files.findIndex(f => f.id === id);
            if (idx > -1) {
                state.files.splice(idx, 1);
                document.getElementById(id).remove();
                updateStats();
                if(state.files.length === 0) els.statsBar.style.display = 'none';
            }
        }

        // --- BULK ACTIONS ---
        els.downloadAllBtn.addEventListener('click', async () => {
            const doneFiles = state.files.filter(f => f.status === 'done');
            if(doneFiles.length === 0) return;

            const zip = new JSZip();
            doneFiles.forEach(f => zip.file(f.newName, f.blob));
            
            const btn = els.downloadAllBtn;
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Zipping...';
            
            const content = await zip.generateAsync({type:"blob"});
            saveAs(content, "prism-converted-images.zip");
            
            btn.innerHTML = originalText;
        });

        els.clearBtn.addEventListener('click', () => {
            state.files = [];
            state.queue = [];
            state.totalSaved = 0;
            els.fileGrid.innerHTML = '';
            els.statsBar.style.display = 'none';
        });

        // --- UTILS ---
        function updateStats() {
            els.countStat.textContent = state.files.length;
            els.sizeStat.textContent = state.totalSaved > 0 ? formatBytes(state.totalSaved) : '0 B';
        }

        function formatBytes(bytes, decimals = 2) {
            if (!+bytes) return '0 Bytes';
            const k = 1024;
            const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return `${parseFloat((bytes / Math.pow(k, i)).toFixed(dm))} ${sizes[i]}`;
        }

        function showToast(msg, type = 'success') {
            const toast = document.createElement('div');
            toast.className = 'toast';
            const icon = type === 'success' ? 'check-circle' : 'alert-triangle';
            const color = type === 'success' ? 'var(--success)' : 'var(--danger)';
            
            toast.innerHTML = `
                <i data-lucide="${icon}" style="color:${color}"></i>
                <span>${msg}</span>
            `;
            document.getElementById('toastContainer').appendChild(toast);
            lucide.createIcons();
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
    </script>
</body>
</html>
